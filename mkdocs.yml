site_name: Standby-Time's Blog
site_url: https://tpdcrn.github.io/
docs_dir: docs

theme:
  name: material
  language: zh # 中文界面
  palette:
    # 浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换至深色模式
    # 深色模式    
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换至浅色模式
  features:
    - navigation.tabs              # 顶部导航
    - navigation.sections          # 侧边栏分组
    - navigation.top               # 回到顶部
    - search.suggest               # 搜索建议

nav:
  - 主页: index.md
  - 技术: 
    - 概览: technology.md
  - 关于: about.md
